<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; font-family: Arial, Helvetica, sans-serif; background-color:#f5f5f5;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center" style="padding:40px 20px;">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; border-radius:8px;">
            <tr>
              <td align="center" style="padding:30px 20px;">
                <img src="cid:logo" alt="Videoflix" width="400" style="display:block; border:0;" />
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 20px 40px; color:#333333; font-size:16px; line-height:24px;">
                Dear <span style="color:#1222d9; font-weight:bold;">{{ username }}</span>,
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 30px 40px; color:#333333; font-size:16px; line-height:24px;">
                Thank you for registering with
                <span style="color:#1222d9; font-weight:bold;">Videoflix</span>. To complete your registration and verify your email address, please click the button below:
              </td>
            </tr>
            <tr>
              <td align="start" style="padding-bottom:30px; padding-left: 30px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td align="center" bgcolor="#1222d9" style="border-radius:20px;">
                      <a href="{{ activation_link }}" style="display:inline-block;
                          padding:12px 24px;
                          color:#ffffff;
                          text-decoration:none;
                          font-size:16px;
                          font-weight:bold;">Activate Your Account</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 20px 40px; color:#666666; font-size:14px; line-height:22px;">If you did not create an account with us, please disregard this email.</td>
            </tr>
            <tr>
              <td style="padding:0 40px 40px 40px; color:#333333; font-size:14px; line-height:22px;">
                Best regards,<br />
                Your Videoflix Team.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
